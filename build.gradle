plugins {
    id 'java-library'
    id 'maven-publish'
    id 'signing'
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'
}

group = 'com.thanhlv.dynamicjsonmapper'
version = '1.0.0'

java {
    withSourcesJar()
    withJavadocJar()
}

repositories {
    mavenCentral()
}

dependencies {
    // Exposed in public API (JsonNode/ObjectMapper appear in public constructors/methods)
    api 'tools.jackson.core:jackson-databind:3.1.3'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

def repoSlug = System.getenv('GITHUB_REPOSITORY') ?: 'thanhlv-com/DynamicJsonMapper'
def projectUrl = "https://github.com/${repoSlug}"

test {
    useJUnitPlatform()
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            artifactId = 'dynamic-json-mapper'

            pom {
                name = 'DynamicJsonMapper'
                description = 'Lightweight Java library for rendering JSON from templates and placeholder data.'
                url = projectUrl

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }

                developers {
                    developer {
                        id = 'thanhlv'
                        name = 'Thanh Le Van'
                        email = 'lethanh9398@gmail.com'
                    }
                }

                scm {
                    url = projectUrl
                    connection = "scm:git:git://github.com/${repoSlug}.git"
                    developerConnection = "scm:git:ssh://git@github.com/${repoSlug}.git"
                }
            }
        }
    }
}

signing {
    def signingKey = findProperty('signingInMemoryKey')
    def signingPassword = findProperty('signingInMemoryKeyPassword')

    if (signingKey && signingPassword) {
        useInMemoryPgpKeys(signingKey.toString(), signingPassword.toString())
    }

    sign publishing.publications.mavenJava
}

nexusPublishing {
    repositories {
        sonatype {
            nexusUrl = uri('https://ossrh-staging-api.central.sonatype.com/service/local/')
            snapshotRepositoryUrl = uri('https://central.sonatype.com/repository/maven-snapshots/')
        }
    }
}

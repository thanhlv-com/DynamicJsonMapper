name: Publish To Maven Central

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Validate with tests
        run: ./gradlew clean test --no-daemon --stacktrace

      - name: Publish and release on Maven Central
        run: ./gradlew publish closeAndReleaseSonatypeStagingRepository --no-daemon --stacktrace
        env:
          sonatypeUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          sonatypePassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          signingInMemoryKey: ${{ secrets.MAVEN_CENTRAL_GPG_PRIVATE_KEY }}
          signingInMemoryKeyPassword: ${{ secrets.MAVEN_CENTRAL_GPG_PASSPHRASE }}
